<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Realtime Chat overall architecture</title>
  <desc id="desc">Realtime chat flow with WebSocket, STOMP authorization, Kafka ordering, Redis presence, database reads, reconnect sync.</desc>
  <rect width="900" height="420" fill="#ffffff"/>
  <style>.box{fill:#f8fafc;stroke:#0f172a;stroke-width:1.5;rx:8}.key{fill:#ecfdf5;stroke:#047857;stroke-width:1.8;rx:8}.pending{fill:#f8fafc;stroke:#64748b;stroke-dasharray:6 5;rx:8}.text{font:600 15px Arial,sans-serif;fill:#0f172a}.small{font:400 12px Arial,sans-serif;fill:#475569}.line{stroke:#334155;stroke-width:1.7;fill:none;marker-end:url(#arrow)}</style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#334155"/></marker></defs>
  <text x="40" y="42" class="text">Realtime Chat 전체 아키텍처</text>
  <rect x="40" y="122" width="130" height="78" class="box"/><text x="64" y="156" class="text">Client</text><text x="64" y="180" class="small">WebSocket</text>
  <rect x="212" y="122" width="150" height="78" class="key"/><text x="234" y="156" class="text">STOMP Auth</text><text x="234" y="180" class="small">subscribe 인가</text>
  <rect x="404" y="92" width="150" height="78" class="box"/><text x="426" y="126" class="text">Kafka</text><text x="426" y="150" class="small">roomId ordering</text>
  <rect x="404" y="232" width="150" height="78" class="key"/><text x="426" y="266" class="text">Room API</text><text x="426" y="290" class="small">N+1 제거 조회</text>
  <rect x="604" y="92" width="130" height="78" class="box"/><text x="626" y="126" class="text">Redis</text><text x="626" y="150" class="small">presence</text>
  <rect x="604" y="232" width="130" height="78" class="key"/><text x="626" y="266" class="text">DB</text><text x="626" y="290" class="small">Room/Message</text>
  <rect x="770" y="162" width="100" height="78" class="pending"/><text x="786" y="196" class="text">Sync API</text><text x="786" y="220" class="small">추가 측정</text>
  <path d="M170 161H212" class="line"/><path d="M362 150L404 132" class="line"/><path d="M362 174L404 252" class="line"/><path d="M554 131H604" class="line"/><path d="M554 271H604" class="line"/><path d="M734 271C756 260 766 236 770 210" class="line"/>
</svg>
