<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Concert Booking overall architecture</title>
  <desc id="desc">Concert booking request flow through queue token, reservation transaction, outbox, Kafka, DLT, PostgreSQL, Redis reconciliation.</desc>
  <rect width="900" height="420" fill="#ffffff"/>
  <style>.box{fill:#f8fafc;stroke:#0f172a;stroke-width:1.5;rx:8}.key{fill:#eff6ff;stroke:#1d4ed8;stroke-width:1.8;rx:8}.warn{fill:#fff7ed;stroke:#c2410c;stroke-width:1.6;rx:8}.text{font:600 15px Arial,sans-serif;fill:#0f172a}.small{font:400 12px Arial,sans-serif;fill:#475569}.line{stroke:#334155;stroke-width:1.7;fill:none;marker-end:url(#arrow)}.fail{stroke:#c2410c;stroke-dasharray:6 5}</style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#334155"/></marker></defs>
  <text x="40" y="42" class="text">Concert Booking 전체 아키텍처</text>
  <rect x="40" y="110" width="130" height="78" class="box"/><text x="64" y="145" class="text">Client</text><text x="64" y="168" class="small">예매/재시도</text>
  <rect x="210" y="110" width="140" height="78" class="box"/><text x="232" y="145" class="text">Queue Token</text><text x="232" y="168" class="small">user + schedule</text>
  <rect x="390" y="92" width="170" height="114" class="key"/><text x="414" y="130" class="text">Reservation Tx</text><text x="414" y="154" class="small">Idempotency-Key</text><text x="414" y="176" class="small">Seat lock + Outbox</text>
  <rect x="610" y="110" width="120" height="78" class="box"/><text x="634" y="145" class="text">Kafka</text><text x="634" y="168" class="small">예약 이벤트</text>
  <rect x="770" y="110" width="100" height="78" class="warn"/><text x="792" y="145" class="text">DLT</text><text x="792" y="168" class="small">실패 격리</text>
  <rect x="390" y="268" width="170" height="82" class="key"/><text x="414" y="304" class="text">PostgreSQL</text><text x="414" y="328" class="small">좌석/예약 최종 기준 데이터</text>
  <rect x="610" y="268" width="170" height="82" class="box"/><text x="634" y="304" class="text">Redis + Reconcile</text><text x="634" y="328" class="small">보조 상태 복구</text>
  <path d="M170 149H210" class="line"/><path d="M350 149H390" class="line"/><path d="M560 149H610" class="line"/><path d="M730 149H770" class="line"/>
  <path d="M475 206V268" class="line"/><path d="M695 268C680 238 650 205 610 180" class="line fail"/>
  <path d="M610 309H560" class="line"/>
</svg>
