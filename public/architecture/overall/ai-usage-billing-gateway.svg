<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">AI Usage Billing Gateway overall architecture</title>
  <desc id="desc">Billing gateway flow through API key authentication, usage idempotency, invoice, webhook, append-only ledger, audit log.</desc>
  <rect width="900" height="420" fill="#ffffff"/>
  <style>.box{fill:#f8fafc;stroke:#0f172a;stroke-width:1.5;rx:8}.key{fill:#eff6ff;stroke:#1d4ed8;stroke-width:1.8;rx:8}.warn{fill:#fff7ed;stroke:#c2410c;stroke-width:1.6;rx:8}.text{font:600 15px Arial,sans-serif;fill:#0f172a}.small{font:400 12px Arial,sans-serif;fill:#475569}.line{stroke:#334155;stroke-width:1.7;fill:none;marker-end:url(#arrow)}</style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#334155"/></marker></defs>
  <text x="40" y="42" class="text">AI Usage Billing Gateway 전체 아키텍처</text>
  <rect x="40" y="126" width="118" height="78" class="box"/><text x="62" y="160" class="text">Tenant</text><text x="62" y="184" class="small">사용량 요청</text>
  <rect x="192" y="126" width="128" height="78" class="key"/><text x="214" y="160" class="text">API Key</text><text x="214" y="184" class="small">prefix/hash</text>
  <rect x="354" y="126" width="140" height="78" class="key"/><text x="376" y="160" class="text">Usage</text><text x="376" y="184" class="small">idempotency</text>
  <rect x="528" y="126" width="130" height="78" class="box"/><text x="550" y="160" class="text">Invoice</text><text x="550" y="184" class="small">tenant 집계</text>
  <rect x="692" y="86" width="140" height="78" class="warn"/><text x="714" y="120" class="text">Webhook</text><text x="714" y="144" class="small">duplicate/conflict</text>
  <rect x="692" y="230" width="140" height="78" class="key"/><text x="714" y="264" class="text">Ledger</text><text x="714" y="288" class="small">append-only</text>
  <rect x="354" y="260" width="140" height="78" class="box"/><text x="376" y="294" class="text">Audit Log</text><text x="376" y="318" class="small">redaction guard</text>
  <path d="M158 165H192" class="line"/><path d="M320 165H354" class="line"/><path d="M494 165H528" class="line"/><path d="M658 151L692 132" class="line"/><path d="M762 164V230" class="line"/><path d="M692 276H494" class="line"/>
</svg>
