<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">new-portfolio content architecture</title>
  <desc id="desc">Portfolio content flows from sourced project data and case metadata into Next.js pages with SVG architecture diagrams.</desc>
  <rect width="900" height="420" fill="#ffffff"/>
  <style>
    .box{fill:#f8fafc;stroke:#0f172a;stroke-width:1.5;rx:8}
    .strong{fill:#eff6ff;stroke:#1d4ed8;stroke-width:1.8;rx:8}
    .text{font:600 16px Arial, sans-serif;fill:#0f172a}
    .small{font:400 13px Arial, sans-serif;fill:#475569}
    .line{stroke:#334155;stroke-width:1.7;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <text x="40" y="42" class="text">new-portfolio 전체 콘텐츠 아키텍처</text>
  <rect x="40" y="86" width="190" height="92" class="strong"/>
  <text x="62" y="122" class="text">projects.ts</text>
  <text x="62" y="148" class="small">측정/검증/예정 근거</text>
  <rect x="40" y="232" width="190" height="92" class="strong"/>
  <text x="62" y="268" class="text">portfolio-cases.ts</text>
  <text x="62" y="294" class="small">문제 구간 구조/읽는 법</text>
  <rect x="352" y="86" width="190" height="92" class="box"/>
  <text x="374" y="122" class="text">Projects Page</text>
  <text x="374" y="148" class="small">전체 구조도 thumbnail</text>
  <rect x="352" y="232" width="190" height="92" class="box"/>
  <text x="374" y="268" class="text">Case Detail</text>
  <text x="374" y="294" class="small">ArchitectureFigure + 근거</text>
  <rect x="670" y="158" width="190" height="104" class="box"/>
  <text x="692" y="194" class="text">Next.js App Router</text>
  <text x="692" y="220" class="small">정적 페이지 / sitemap</text>
  <text x="692" y="242" class="small">SVG는 public 제공</text>
  <path d="M230 132 H352" class="line"/>
  <path d="M230 278 H352" class="line"/>
  <path d="M542 132 C600 132 610 182 670 190" class="line"/>
  <path d="M542 278 C600 278 610 232 670 224" class="line"/>
  <path d="M135 178 V232" class="line"/>
</svg>
